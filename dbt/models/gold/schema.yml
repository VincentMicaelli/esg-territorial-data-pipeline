version: 2

models:
  - name: gold_esg_iris_final
    description: "Table ESG finale par IRIS – livrable principal"
    columns:
      - name: iris_code
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('silver_referentiel_iris')
              field: iris_code

      - name: score_esg_0_100
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: score_social_0_100
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
              row_condition: "score_social_0_100 IS NOT NULL"

      - name: taux_pauvrete_60
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
              row_condition: "taux_pauvrete_60 IS NOT NULL"

      - name: taux_chomage_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
              row_condition: "taux_chomage_pct IS NOT NULL"

      - name: pct_completude
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: version_modele
        tests: [not_null]

  - name: gold_esg_bassin_vie_final
    description: "Indicateurs ESG agrégés par Bassin de Vie"
    columns:
      - name: bv_code
        tests: [not_null, unique]
      - name: population_totale_bv
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 5000000