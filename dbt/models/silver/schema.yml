version: 2

models:
  - name: silver_referentiel_iris
    description: "Référentiel territorial maître – un IRIS = une ligne"
    columns:
      - name: iris_code
        tests: [not_null, unique]
      - name: bv_code
        tests: [not_null]
      - name: dep_code
        tests: [not_null]

  - name: silver_filosofi
    description: "FILOSOFI 2021 nettoyé"
    columns:
      - name: iris_code
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('silver_referentiel_iris')
              field: iris_code
      - name: taux_pauvrete_60
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
              row_condition: "taux_pauvrete_60 IS NOT NULL"

  - name: silver_rp_population
    description: "RP 2022 – Population"
    columns:
      - name: iris_code
        tests: [not_null, unique]
      - name: population_totale
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100000
              row_condition: "population_totale IS NOT NULL"

  - name: silver_rp_activite
    description: "RP 2022 – Activité"
    columns:
      - name: iris_code
        tests: [not_null, unique]
      - name: taux_chomage_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
              row_condition: "taux_chomage_pct IS NOT NULL"

  - name: silver_rp_logement
    description: "RP 2022 – Logement"
    columns:
      - name: iris_code
        tests: [not_null, unique]

  - name: silver_bpe
    description: "BPE 2024 – Équipements agrégés par IRIS"
    columns:
      - name: iris_code
        tests: [not_null, unique]
      - name: nb_equipements_total
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 5000

  - name: silver_passoires_energetiques
    description: "Passoires énergétiques 2022 normalisées à la maille IRIS"
    columns:
      - name: iris_code
        tests: [not_null, unique]
      - name: taux_passoires_energetiques_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
              row_condition: "taux_passoires_energetiques_pct IS NOT NULL"
