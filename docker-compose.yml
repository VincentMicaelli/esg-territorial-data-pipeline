networks:
  esg-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  airflow_logs:
  airflow_home:
  grafana_data:
  marquez_data:

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
    AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"

    # OpenLineage provider config for Airflow 2.8.x
    AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type":"http","url":"http://marquez:5000","endpoint":"api/v1/lineage"}'
    AIRFLOW__OPENLINEAGE__NAMESPACE: ${OPENLINEAGE_NAMESPACE}

    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_HOST: ${POSTGRES_HOST}
    POSTGRES_PORT: ${POSTGRES_PORT}
    POSTGRES_DB: ${POSTGRES_DB}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    PYTHONPATH: /opt/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./ingestion:/opt/airflow/ingestion
    - ./data:/opt/airflow/data
    - ./requirements.txt:/opt/airflow/requirements.txt:ro
    - ./great_expectations:/opt/airflow/gx
    - ./infra/airflow:/opt/airflow/bootstrap:ro
    - ./dbt:/opt/dbt
    - airflow_home:/home/airflow/.local
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    postgres-init-users:
      condition: service_completed_successfully
  networks:
    - esg-net

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: esg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ROLE_DE_PASSWORD: ${ROLE_DE_PASSWORD:-role_de_password}
      DS_USER1_PASSWORD: ${DS_USER1_PASSWORD:-ds1_ps}
      DS_USER2_PASSWORD: ${DS_USER2_PASSWORD:-ds2_ps}
      DA_USER_PASSWORD: ${DA_USER_PASSWORD:-da_ps}
      AUDIT_USER_PASSWORD: ${AUDIT_USER_PASSWORD:-audit_ps}
      METABASE_USER_PASSWORD: ${METABASE_USER_PASSWORD:-metabase_ps}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./infra/postgres/users.sh:/docker-entrypoint-initdb.d/02_users.sh:ro
    ports:
      - "5432:5432"
    networks:
      - esg-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  postgres-init-users:
    image: postgis/postgis:16-3.4
    container_name: esg_postgres_init_users
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ROLE_DE_PASSWORD: ${ROLE_DE_PASSWORD:-role_de_password}
      DS_USER1_PASSWORD: ${DS_USER1_PASSWORD:-ds1_ps}
      DS_USER2_PASSWORD: ${DS_USER2_PASSWORD:-ds2_ps}
      DA_USER_PASSWORD: ${DA_USER_PASSWORD:-da_ps}
      AUDIT_USER_PASSWORD: ${AUDIT_USER_PASSWORD:-audit_ps}
      METABASE_USER_PASSWORD: ${METABASE_USER_PASSWORD:-metabase_ps}
    volumes:
      - ./infra/postgres/users.sh:/opt/postgres/users.sh:ro
    command: ["bash", "/opt/postgres/users.sh"]
    networks:
      - esg-net

  minio:
    image: minio/minio:RELEASE.2024-03-30T09-41-56Z
    container_name: esg_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    networks:
      - esg-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 15s

  minio-init:
    image: minio/mc:RELEASE.2024-03-30T15-29-52Z
    container_name: esg_minio_init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - esg-net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      mc mb --ignore-existing local/backups;
      mc anonymous set none local/bronze;
      mc anonymous set none local/silver;
      echo 'MinIO buckets initialized';
      "

  airflow-init:
    <<: *airflow-common
    container_name: esg_airflow_init
    command: >-
      bash -c "bash /opt/airflow/bootstrap/init-airflow.sh"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: esg_airflow_web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init-users:
        condition: service_completed_successfully
      airflow-init:
        condition: service_completed_successfully
      marquez:
        condition: service_healthy
    command: >-
      bash -c "bash /opt/airflow/bootstrap/run-airflow-webserver.sh"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  airflow-scheduler:
    <<: *airflow-common
    container_name: esg_airflow_scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init-users:
        condition: service_completed_successfully
      airflow-init:
        condition: service_completed_successfully
      marquez:
        condition: service_healthy
    command: >-
      bash -c "bash /opt/airflow/bootstrap/run-airflow-scheduler.sh"
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

  marquez:
    image: marquezproject/marquez:0.47.0
    container_name: esg_marquez
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MARQUEZ_CONFIG: /opt/marquez/marquez.yml
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      MARQUEZ_DB_HOST: postgres
      MARQUEZ_DB_PORT: 5432
      MARQUEZ_DB_USER: ${POSTGRES_USER}
      MARQUEZ_DB_PASSWORD: ${POSTGRES_PASSWORD}
      MARQUEZ_DB_NAME: ${POSTGRES_DB}
    ports:
      - "5000:5000"
      - "5001:5001"
    volumes:
      - marquez_data:/opt/marquez
      - ./infra/marquez/marquez.yml:/opt/marquez/marquez.yml:ro
    networks:
      - esg-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/namespaces"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  marquez-web:
    image: marquezproject/marquez-web:0.47.0
    container_name: esg_marquez_web
    restart: unless-stopped
    depends_on:
      marquez:
        condition: service_healthy
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000
    ports:
      - "3000:3000"
    networks:
      - esg-net

  metabase:
    image: metabase/metabase:v0.49.0
    container_name: esg_metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init-users:
        condition: service_completed_successfully
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
      MB_SITE_NAME: "ESG Territorial - Banque"
    ports:
      - "3001:3000"
    networks:
      - esg-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 60s

  jupyterhub:
    image: jupyter/datascience-notebook:python-3.11
    container_name: esg_jupyterhub
    restart: unless-stopped
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./requirements_ds.txt:/tmp/requirements_ds.txt
    ports:
      - "8888:8888"
    networks:
      - esg-net
    command: >
      bash -c "pip install -r /tmp/requirements_ds.txt && start-notebook.sh"

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: esg_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - esg-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: esg_pg_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - esg-net
    depends_on:
      postgres:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.2.0
    container_name: esg_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SECURITY_ADMIN_USER: admin
      GF_SERVER_DOMAIN: localhost
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3002:3000"
    networks:
      - esg-net
